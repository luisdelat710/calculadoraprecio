<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora Pro | Pisos y Azulejos Acosta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f3f4f6; }
        .card-gradient { background: linear-gradient(135deg, #ffffff 0%, #f9fafb 100%); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
    </style>
</head>
<body>
    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="max-w-md w-full mx-auto p-8 bg-white rounded-3xl shadow-2xl border border-gray-100 card-gradient">
            <div class="flex items-center gap-3 mb-8 text-blue-600">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                <h1 class="text-2xl font-black uppercase tracking-tighter text-blue-600">Pisos Acosta</h1>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Costo de Caja sin IVA ($)</label>
                    <input type="number" id="cost" class="w-full px-5 py-3 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-blue-500 outline-none transition-all text-xl font-bold text-gray-700" placeholder="Escribe el costo..." />
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">Margen de Ganancia (%)</label>
                    <input type="number" id="margin" value="30" class="w-full px-5 py-3 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-blue-500 outline-none transition-all text-xl font-bold text-blue-600" placeholder="Ej: 30" />
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 uppercase mb-2">M² por Caja <span class="text-gray-300 normal-case font-medium">(opcional)</span></label>
                    <input type="number" id="m2" step="0.01" class="w-full px-5 py-3 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-purple-500 outline-none transition-all text-xl font-bold text-purple-600" placeholder="Ej: 1.64" />
                </div>

                <div id="results-container" class="hidden space-y-4">
                    <div onclick="copyValue('total')" class="p-6 bg-blue-600 rounded-3xl text-white shadow-xl shadow-blue-200 cursor-pointer active:scale-95 transition-transform">
                        <p class="text-blue-100 text-[10px] font-black uppercase tracking-widest mb-1">Precio por Caja</p>
                        <div class="flex justify-between items-center">
                            <p class="text-4xl font-black">$<span id="res-total">0.00</span></p>
                            <span id="copy-total" class="text-xs bg-white/20 px-2 py-1 rounded-lg backdrop-blur-sm">Copiar</span>
                        </div>
                    </div>

                    <div id="m2-container" onclick="copyValue('m2')" class="hidden p-6 bg-purple-600 rounded-3xl text-white shadow-xl shadow-purple-200 cursor-pointer active:scale-95 transition-transform">
                        <p class="text-purple-100 text-[10px] font-black uppercase tracking-widest mb-1">Precio por M²</p>
                        <div class="flex justify-between items-center">
                            <p class="text-4xl font-black">$<span id="res-pm2">0.00</span></p>
                            <span id="copy-m2" class="text-xs bg-white/20 px-2 py-1 rounded-lg backdrop-blur-sm">Copiar</span>
                        </div>
                        <p class="text-purple-100 text-[10px] font-medium mt-2">Costo por M²: $<span id="res-cm2">0.00</span></p>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="p-4 bg-green-50 rounded-2xl border border-green-100">
                            <p class="text-[10px] font-bold text-green-600 uppercase mb-1">Ganancia / Caja</p>
                            <p class="text-xl font-black text-green-700">+$<span id="res-profit">0.00</span></p>
                        </div>
                        <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                            <p class="text-[10px] font-bold text-gray-400 uppercase mb-1">IVA (16%)</p>
                            <p class="text-xl font-black text-gray-700">$<span id="res-iva">0.00</span></p>
                        </div>
                    </div>
                    
                    <p class="text-[11px] text-center text-gray-400 font-medium">
                        Subtotal sin IVA: $<span id="res-sub">0.00</span>
                    </p>
                </div>
                
                <div id="empty-state" class="py-10 text-center border-2 border-dashed border-gray-200 rounded-3xl">
                    <p class="text-gray-400 font-bold text-sm">Esperando datos...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const costInput = document.getElementById('cost');
        const marginInput = document.getElementById('margin');
        const m2Input = document.getElementById('m2');
        const resultsContainer = document.getElementById('results-container');
        const emptyState = document.getElementById('empty-state');
        const m2Container = document.getElementById('m2-container');

        function calculate() {
            const c = parseFloat(costInput.value);
            const m = parseFloat(marginInput.value);
            const m2 = parseFloat(m2Input.value);

            if (c > 0 && m >= 0 && m < 100) {
                const priceBeforeVAT = c / (1 - (m / 100));
                const vatAmount = priceBeforeVAT * 0.16;
                const finalPrice = priceBeforeVAT + vatAmount;
                const profit = priceBeforeVAT - c;

                document.getElementById('res-sub').textContent = priceBeforeVAT.toFixed(2);
                document.getElementById('res-iva').textContent = vatAmount.toFixed(2);
                document.getElementById('res-total').textContent = finalPrice.toFixed(2);
                document.getElementById('res-profit').textContent = profit.toFixed(2);

                if (m2 > 0) {
                    m2Container.classList.remove('hidden');
                    document.getElementById('res-pm2').textContent = (finalPrice / m2).toFixed(2);
                    document.getElementById('res-cm2').textContent = (c / m2).toFixed(2);
                } else {
                    m2Container.classList.add('hidden');
                }

                resultsContainer.classList.remove('hidden');
                emptyState.classList.add('hidden');
            } else {
                resultsContainer.classList.add('hidden');
                emptyState.classList.remove('hidden');
            }
        }

        costInput.addEventListener('input', calculate);
        marginInput.addEventListener('input', calculate);
        m2Input.addEventListener('input', calculate);

        window.copyValue = function(type) {
            const value = document.getElementById(type === 'total' ? 'res-total' : 'res-pm2').textContent;
            navigator.clipboard.writeText(`$${value}`);
            
            const badge = document.getElementById(type === 'total' ? 'copy-total' : 'copy-m2');
            const originalText = badge.textContent;
            badge.textContent = "¡Copiado!";
            setTimeout(() => badge.textContent = originalText, 2000);
        }
    </script>
</body>
</html>
