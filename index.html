<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora Pro | Pisos y Azulejos Acosta</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        body { background-color: #f3f4f6; }
        .card-gradient { background: linear-gradient(135deg, #ffffff 0%, #f9fafb 100%); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const PriceCalculator = () => {
            const [cost, setCost] = useState('');
            const [margin, setMargin] = useState('30');
            const [m2PerBox, setM2PerBox] = useState('');
            const [results, setResults] = useState(null);
            const [copied, setCopied] = useState(null);

            useEffect(() => {
                const c = parseFloat(cost);
                const m = parseFloat(margin);
                const m2 = parseFloat(m2PerBox);

                if (c > 0 && m >= 0 && m < 100) {
                    const priceBeforeVAT = c / (1 - (m / 100));
                    const vatAmount = priceBeforeVAT * 0.16;
                    const finalPrice = priceBeforeVAT + vatAmount;
                    const profit = priceBeforeVAT - c;

                    let pricePerM2 = null;
                    let costPerM2 = null;
                    if (m2 > 0) {
                        pricePerM2 = finalPrice / m2;
                        costPerM2 = c / m2;
                    }

                    setResults({
                        subtotal: priceBeforeVAT.toFixed(2),
                        iva: vatAmount.toFixed(2),
                        total: finalPrice.toFixed(2),
                        profit: profit.toFixed(2),
                        pricePerM2: pricePerM2 !== null ? pricePerM2.toFixed(2) : null,
                        costPerM2: costPerM2 !== null ? costPerM2.toFixed(2) : null
                    });
                } else {
                    setResults(null);
                }
            }, [cost, margin, m2PerBox]);

            const copyToClipboard = (value, key) => {
                navigator.clipboard.writeText(`$${value}`);
                setCopied(key);
                setTimeout(() => setCopied(null), 2000);
            };

            return (
                <div className="max-w-md mx-auto p-8 bg-white rounded-3xl shadow-2xl border border-gray-100 card-gradient">
                    <div className="flex items-center gap-3 mb-8 text-blue-600">
                        <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                        <h1 className="text-2xl font-black uppercase tracking-tighter text-blue-600">Pisos Acosta</h1>
                    </div>
                    
                    <div className="space-y-5">
                        <div>
                            <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Costo de Caja sin IVA ($)</label>
                            <input
                                type="number"
                                value={cost}
                                onChange={(e) => setCost(e.target.value)}
                                className="w-full px-5 py-3 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-blue-500 outline-none transition-all text-xl font-bold text-gray-700"
                                placeholder="Escribe el costo..."
                            />
                        </div>
                        
                        <div>
                            <label className="block text-xs font-bold text-gray-400 uppercase mb-2">Margen de Ganancia (%)</label>
                            <input
                                type="number"
                                value={margin}
                                onChange={(e) => setMargin(e.target.value)}
                                className="w-full px-5 py-3 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-blue-500 outline-none transition-all text-xl font-bold text-blue-600"
                                placeholder="Ej: 30"
                            />
                        </div>

                        <div>
                            <label className="block text-xs font-bold text-gray-400 uppercase mb-2">
                                M² por Caja <span className="text-gray-300 normal-case font-medium">(opcional)</span>
                            </label>
                            <input
                                type="number"
                                step="0.01"
                                value={m2PerBox}
                                onChange={(e) => setM2PerBox(e.target.value)}
                                className="w-full px-5 py-3 bg-gray-50 border-2 border-gray-100 rounded-2xl focus:border-purple-500 outline-none transition-all text-xl font-bold text-purple-600"
                                placeholder="Ej: 1.64"
                            />
                        </div>

                        {results ? (
                            <div className="space-y-4">
                                <div 
                                    onClick={() => copyToClipboard(results.total, 'box')}
                                    className="p-6 bg-blue-600 rounded-3xl text-white shadow-xl shadow-blue-200 cursor-pointer active:scale-95 transition-transform"
                                >
                                    <p className="text-blue-100 text-[10px] font-black uppercase tracking-widest mb-1">Precio por Caja</p>
                                    <div className="flex justify-between items-center">
                                        <p className="text-4xl font-black">${results.total}</p>
                                        <span className="text-xs bg-white/20 px-2 py-1 rounded-lg backdrop-blur-sm">
                                            {copied === 'box' ? "¡Copiado!" : "Copiar"}
                                        </span>
                                    </div>
                                </div>

                                {results.pricePerM2 && (
                                    <div 
                                        onClick={() => copyToClipboard(results.pricePerM2, 'm2')}
                                        className="p-6 bg-purple-600 rounded-3xl text-white shadow-xl shadow-purple-200 cursor-pointer active:scale-95 transition-transform"
                                    >
                                        <p className="text-purple-100 text-[10px] font-black uppercase tracking-widest mb-1">Precio por M²</p>
                                        <div className="flex justify-between items-center">
                                            <p className="text-4xl font-black">${results.pricePerM2}</p>
                                            <span className="text-xs bg-white/20 px-2 py-1 rounded-lg backdrop-blur-sm">
                                                {copied === 'm2' ? "¡Copiado!" : "Copiar"}
                                            </span>
                                        </div>
                                        <p className="text-purple-100 text-[10px] font-medium mt-2">
                                            Costo por M²: ${results.costPerM2}
                                        </p>
                                    </div>
                                )}

                                <div className="grid grid-cols-2 gap-3">
                                    <div className="p-4 bg-green-50 rounded-2xl border border-green-100">
                                        <p className="text-[10px] font-bold text-green-600 uppercase mb-1">Ganancia / Caja</p>
                                        <p className="text-xl font-black text-green-700">+${results.profit}</p>
                                    </div>
                                    <div className="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                        <p className="text-[10px] font-bold text-gray-400 uppercase mb-1">IVA (16%)</p>
                                        <p className="text-xl font-black text-gray-700">${results.iva}</p>
                                    </div>
                                </div>
                                
                                <p className="text-[11px] text-center text-gray-400 font-medium">
                                    Subtotal sin IVA: ${results.subtotal}
                                </p>
                            </div>
                        ) : (
                            <div className="py-10 text-center border-2 border-dashed border-gray-200 rounded-3xl">
                                <p className="text-gray-400 font-bold text-sm">Esperando datos...</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => (
            <div className="min-h-screen flex items-center justify-center p-4">
                <PriceCalculator />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
